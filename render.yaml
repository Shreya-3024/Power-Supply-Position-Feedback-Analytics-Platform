databases: []

services:
  # Backend API (Express + MongoDB)
  - type: web
    name: power-supply-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: src/backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false  # You'll set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false  # Set to your frontend Render URL after deploy
    healthCheckPath: /health

  # Frontend (React/Vite Static Site)
  - type: web
    name: power-supply-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_URL
        sync: false  # Set to https://power-supply-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
